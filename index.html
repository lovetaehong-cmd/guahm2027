<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, viewport-fit=cover">
<title>구암고 과목 선택 도우미</title>
<link rel="preconnect" href="https://cdn.jsdelivr.net">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/variable/pretendardvariable-dynamic-subset.min.css">
<style>
:root{
 --ink:#16324f; --ink2:#22496b; --ink3:#365f86;
 --sage:#0d8a6f; --sage-d:#0a6e59; --sage-l:#e6f4f0;
 --amber:#c8790d; --amber-l:#fdf3e3; --red:#c0392b; --red-l:#fbecea;
 --paper:#f6f7f4; --card:#ffffff; --line:#dfe3dc; --line2:#eceee9;
 --t1:#1c2b39; --t2:#4a5b6b; --t3:#8595a3;
 --shadow:0 1px 3px rgba(20,40,60,.07),0 6px 20px rgba(20,40,60,.06);
 --radius:14px;
 --safe-b: env(safe-area-inset-bottom, 0px);
 --safe-t: env(safe-area-inset-top, 0px);
}
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{height:100%}
body{font-family:'Pretendard Variable',Pretendard,-apple-system,sans-serif;background:var(--paper);color:var(--t1);font-size:15px;line-height:1.6;-webkit-font-smoothing:antialiased;overscroll-behavior-y:none}
button{font-family:inherit;cursor:pointer}
a{color:var(--ink3);text-decoration:none}
a:hover{text-decoration:underline}
:focus-visible{outline:2px solid var(--sage);outline-offset:2px}
::-webkit-scrollbar{width:8px;height:8px}
::-webkit-scrollbar-thumb{background:#c7cfc9;border-radius:6px}
::-webkit-scrollbar-track{background:transparent}
@media(prefers-reduced-motion:reduce){*{animation-duration:.01ms!important;transition-duration:.01ms!important}}

/* ===== App shell (mobile-first) ===== */
#app{display:flex;flex-direction:column;min-height:100vh}
header#topbar{position:sticky;top:0;z-index:50;background:linear-gradient(100deg,var(--ink),var(--ink2));color:#fff;padding:calc(12px + var(--safe-t)) 18px 12px;box-shadow:0 2px 14px rgba(16,50,79,.2)}
.brand{display:flex;align-items:center;gap:11px}
.brand .mark{width:36px;height:36px;border-radius:10px;background:linear-gradient(135deg,var(--sage),#12b48f);display:grid;place-items:center;font-weight:800;color:#fff;font-size:13px;flex-shrink:0;box-shadow:inset 0 0 0 1.5px rgba(255,255,255,.25)}
.brand b{font-size:16px;font-weight:800;letter-spacing:-.3px;display:block;line-height:1.25}
.brand span{font-size:11px;color:#b9d0e0;font-weight:500}
.gradeToggle{display:flex;background:rgba(255,255,255,.13);border-radius:9px;padding:3px;margin-left:auto;flex-shrink:0}
.gradeToggle button{border:0;background:transparent;color:#cfe0ec;font-weight:700;font-size:12.5px;padding:6px 12px;border-radius:7px;transition:.15s;white-space:nowrap}
.gradeToggle button.on{background:#fff;color:var(--ink)}
.topbar-row{display:flex;align-items:center;gap:10px}

main#main{flex:1;padding:16px 14px calc(84px + var(--safe-b));max-width:640px;width:100%;margin:0 auto}
.page{animation:fade .22s ease}
@keyframes fade{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

nav#tabbar{position:fixed;left:0;right:0;bottom:0;z-index:50;background:var(--card);border-top:1px solid var(--line);display:flex;padding:4px 2px calc(4px + var(--safe-b));box-shadow:0 -2px 14px rgba(20,40,60,.06)}
nav#tabbar button{flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;border:0;background:transparent;color:var(--t3);font-weight:600;font-size:10.5px;padding:7px 2px 6px;border-radius:10px;transition:.13s}
nav#tabbar button .ic{font-size:19px;line-height:1}
nav#tabbar button.on{color:var(--sage-d)}
nav#tabbar button.on .ic{transform:translateY(-1px)}

/* ===== Common ===== */
.phead{margin-bottom:16px}
.phead .eyebrow{font-size:11px;font-weight:700;color:var(--sage-d);letter-spacing:.4px;margin-bottom:4px}
.phead h1{font-size:21px;font-weight:800;letter-spacing:-.5px;color:var(--ink)}
.phead p{color:var(--t2);margin-top:6px;font-size:13.5px}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--radius);box-shadow:var(--shadow)}
.card.pad{padding:16px}
.grid{display:grid;gap:12px}
.g2{grid-template-columns:repeat(2,1fr)}
.g3{grid-template-columns:repeat(3,1fr)}
@media(max-width:480px){.g3{grid-template-columns:repeat(2,1fr)}}
.stack{display:flex;flex-direction:column;gap:12px}
.btn{display:inline-flex;align-items:center;justify-content:center;gap:7px;border:1px solid var(--line);background:#fff;color:var(--ink2);font-weight:700;font-size:13.5px;padding:11px 16px;border-radius:11px;transition:.13s;-webkit-user-select:none;user-select:none}
.btn:active{transform:scale(.98)}
.btn.pri{background:var(--sage);border-color:var(--sage);color:#fff}
.btn.ink{background:var(--ink);border-color:var(--ink);color:#fff}
.btn.sm{padding:8px 12px;font-size:12.5px}
.btn.danger{color:var(--red);border-color:#e6c3bd}
.btn.block{width:100%}
.chip{display:inline-flex;align-items:center;gap:5px;font-size:12px;font-weight:600;padding:5px 11px;border-radius:20px;background:var(--line2);color:var(--t2)}
.chip.국어{background:#e8f0fb;color:#2a5fa0}.chip.수학{background:#eae7fb;color:#5b46b3}
.chip.영어{background:#fdeee6;color:#c05a1e}.chip.사회{background:#fbf0e2;color:#a8720a}
.chip.과학{background:#e4f5ee;color:#0a7a5f}.chip.체육{background:#f0e9e2;color:#7a5a3a}
.chip.예술{background:#fce8f0;color:#b0417a}.chip.기가정{background:#e7f0f2;color:#2a7585}
.chip.외한{background:#eef0e6;color:#6a7a2a}.chip.교양{background:#eef0f2;color:#556575}
.tag{font-size:11px;font-weight:700;padding:2px 8px;border-radius:6px}
.tag.공통{background:#eef1f5;color:#556}.tag.일반{background:#e8f0fb;color:#2a5fa0}
.tag.진로{background:var(--sage-l);color:var(--sage-d)}.tag.융합{background:var(--amber-l);color:var(--amber)}
table.tbl{width:100%;border-collapse:collapse;font-size:12.5px}
table.tbl th{background:#f2f4f0;color:var(--t2);font-weight:700;text-align:left;padding:8px 9px;border-bottom:2px solid var(--line);font-size:11.5px}
table.tbl td{padding:7px 9px;border-bottom:1px solid var(--line2)}
.g-badge{display:inline-grid;place-items:center;width:24px;height:24px;border-radius:7px;font-weight:800;font-size:12px;color:#fff}
.empty{text-align:center;color:var(--t3);padding:40px 16px}
.empty .ic{font-size:36px;opacity:.4;margin-bottom:10px}
.muted{color:var(--t3);font-size:12.5px}
.notice{background:var(--amber-l);border:1px solid #ecd3a3;border-radius:10px;padding:11px 14px;font-size:12.8px;color:#8a5a08;display:flex;gap:9px}
.notice.ok{background:var(--sage-l);border-color:#a8ddcf;color:var(--sage-d)}
.notice.err{background:var(--red-l);border-color:#e6c3bd;color:var(--red)}
.searchbar{display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-bottom:14px}
.searchbar input[type=text]{flex:1 1 100%;border:1px solid var(--line);border-radius:11px;padding:12px 14px;font-size:15px;font-family:inherit;background:#fff}
.searchbar input:focus{outline:2px solid var(--sage-l);border-color:var(--sage)}
.pillrow{display:flex;gap:8px;flex-wrap:wrap;overflow-x:auto;-webkit-overflow-scrolling:touch;padding-bottom:2px}
.pill{border:1px solid var(--line);background:#fff;color:var(--t2);font-weight:600;font-size:12.5px;padding:8px 13px;border-radius:20px;transition:.13s;white-space:nowrap;flex-shrink:0}
.pill.on{background:var(--ink);border-color:var(--ink);color:#fff}
.linklist{display:flex;flex-wrap:wrap;gap:8px}
.linklist a{display:inline-flex;align-items:center;gap:6px;border:1px solid var(--line);background:#fff;padding:9px 13px;border-radius:10px;font-size:12.5px;font-weight:600;color:var(--ink2)}
.linklist a:hover{border-color:var(--ink3);text-decoration:none;background:#f8fafb}
.linklist a::after{content:"↗";font-size:10px;color:var(--t3)}

/* modal (bottom sheet on mobile) */
.modal-bg{position:fixed;inset:0;background:rgba(16,30,45,.5);z-index:100;display:none;align-items:flex-end;justify-content:center}
.modal-bg.show{display:flex}
.modal{background:#fff;border-radius:20px 20px 0 0;max-width:640px;width:100%;max-height:88vh;display:flex;flex-direction:column;box-shadow:0 -8px 40px rgba(0,0,0,.25);animation:sheetUp .22s cubic-bezier(.2,.8,.3,1)}
@keyframes sheetUp{from{transform:translateY(24px);opacity:.6}to{transform:none;opacity:1}}
.modal-grip{width:36px;height:4px;background:var(--line);border-radius:3px;margin:9px auto 2px}
.modal-h{display:flex;align-items:flex-start;gap:12px;padding:12px 18px 14px;border-bottom:1px solid var(--line)}
.modal-h h3{font-size:17px;font-weight:800;color:var(--ink);flex:1;line-height:1.35}
.modal-h .x{border:0;background:var(--line2);width:30px;height:30px;border-radius:8px;font-size:16px;color:var(--t2);flex-shrink:0}
.modal-b{padding:16px 18px;overflow-y:auto;-webkit-overflow-scrolling:touch}
.modal-f{padding:12px 18px calc(12px + var(--safe-b));border-top:1px solid var(--line);display:flex;justify-content:flex-end;gap:8px;flex-wrap:wrap}

.field{margin-bottom:14px}
.field label{display:block;font-size:12.5px;font-weight:700;color:var(--t2);margin-bottom:6px}
.field h4{font-size:13.5px;font-weight:800;color:var(--ink2);margin:14px 0 8px;padding-bottom:5px;border-bottom:1px solid var(--line2);display:flex;align-items:center;gap:8px}
.field h4::before{content:"";width:4px;height:14px;background:var(--sage);border-radius:2px}
.kv{display:grid;grid-template-columns:96px 1fr;gap:6px 12px;font-size:13px}
.kv dt{color:var(--t3);font-weight:600}.kv dd{color:var(--t1)}
select.inp,input.inp{border:1px solid var(--line);border-radius:11px;padding:11px 12px;font-size:15px;font-family:inherit;background:#fff;width:100%}

/* ===== 과목선택 설계 ===== */
.semcol{margin-bottom:14px}
.semhead{display:flex;align-items:center;gap:9px;margin-bottom:9px;flex-wrap:wrap}
.semhead b{font-size:14.5px;font-weight:800;color:var(--ink)}
.semhead .req{font-size:11px;font-weight:700;color:var(--sage-d);background:var(--sage-l);padding:3px 9px;border-radius:14px}
.subjcard{border:1px solid var(--line);border-radius:11px;padding:11px 12px;background:#fff;display:flex;align-items:center;gap:9px;transition:.12s;cursor:pointer;position:relative;-webkit-user-select:none;user-select:none}
.subjcard:active{transform:scale(.98)}
.subjcard.picked{background:var(--sage-l);border-color:var(--sage)}
.subjcard.rec{box-shadow:0 0 0 2px var(--amber-l)}
.subjcard .nm{font-weight:700;font-size:13.5px;color:var(--ink);flex:1}
.subjcard .recbadge{position:absolute;top:-8px;right:8px;background:var(--amber);color:#fff;font-size:10px;font-weight:800;padding:2px 8px;border-radius:10px}
.subjcard .info{border:0;background:var(--line2);width:24px;height:24px;border-radius:7px;font-size:12px;color:var(--t2);font-weight:800;flex-shrink:0}
.subjgrid{display:grid;grid-template-columns:1fr;gap:8px}
@media(min-width:420px){.subjgrid{grid-template-columns:repeat(2,1fr)}}
.cart-h{background:linear-gradient(120deg,var(--ink),var(--ink2));color:#fff;padding:15px 17px;border-radius:14px 14px 0 0}
.cart-h b{font-size:15px;font-weight:800}
.cart-b{border:1px solid var(--line);border-top:0;border-radius:0 0 14px 14px;background:#fff}
.gauge{padding:13px 17px;border-bottom:1px solid var(--line2)}
.gauge .lab{display:flex;justify-content:space-between;font-size:12px;font-weight:600;margin-bottom:6px}
.gauge .lab .v{font-weight:800}
.bar{height:7px;background:var(--line2);border-radius:5px;overflow:hidden}
.bar>i{display:block;height:100%;border-radius:5px;transition:.3s}
.rulelist{padding:8px 17px 13px}
.rule{display:flex;gap:8px;align-items:flex-start;padding:6px 0;font-size:12.5px;border-bottom:1px dashed var(--line2)}
.rule:last-child{border:0}
.rule .st{width:16px;flex-shrink:0;font-weight:800}
.rule.ok .st{color:#188a4a}.rule.warn .st{color:var(--amber)}.rule.bad .st{color:var(--red)}
.rule .tx{flex:1;color:var(--t2)}
.rule.bad .tx{color:var(--red)}
.recbox{background:var(--amber-l);border:1px solid #ecd3a3;border-radius:11px;padding:12px 14px;margin-bottom:14px}
.recbox b{color:var(--amber);font-size:13px}
.recbox .why{font-size:12.8px;color:#7a5208;margin-top:6px;line-height:1.6}
.gwrow{display:flex;gap:5px;flex-wrap:wrap}
.stat-strip{display:flex;gap:8px;flex-wrap:wrap;margin:12px 0}
.stat{flex:1;min-width:100px;background:#fff;border:1px solid var(--line);border-radius:11px;padding:11px 12px}
.stat .n{font-size:19px;font-weight:800;color:var(--ink)}
.stat .l{font-size:11px;color:var(--t3);font-weight:600}
.deptcard{cursor:pointer;-webkit-user-select:none;user-select:none}
.deptcard:active{transform:scale(.98)}
.deptcard h3{font-size:15px;font-weight:800;color:var(--ink);margin-bottom:3px}
.deptcard .gy{font-size:11px;color:var(--sage-d);font-weight:700}
.deptcard p{font-size:12px;color:var(--t2);margin-top:6px;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.roadmap{position:relative;padding-left:6px}
.rmitem{position:relative;padding:0 0 20px 26px;border-left:2px solid var(--line)}
.rmitem:last-child{border-left-color:transparent}
.rmitem .dot{position:absolute;left:-8px;top:0;width:16px;height:16px;border-radius:50%;background:var(--sage);border:3px solid #fff;box-shadow:0 0 0 1px var(--sage)}
.rmitem b{font-size:14px;font-weight:800;color:var(--ink)}
.rmitem .yr{font-size:11px;font-weight:700;color:var(--sage-d);background:var(--sage-l);padding:2px 8px;border-radius:12px;margin-left:6px;display:inline-block;margin-top:3px}
.rmitem p{font-size:12.5px;color:var(--t2);margin-top:5px}
.testcard{display:flex;flex-direction:column;gap:9px;padding:16px}
.testcard .ti{font-size:15px;font-weight:800;color:var(--ink);display:flex;align-items:center;gap:8px}
.testcard .tnum{width:24px;height:24px;border-radius:8px;background:var(--sage);color:#fff;display:grid;place-items:center;font-size:12.5px;font-weight:800;flex-shrink:0}
.testcard p{font-size:12.5px;color:var(--t2);flex:1}
.hlbar{height:18px;background:var(--line2);border-radius:4px;position:relative;overflow:hidden}
.hlbar>i{position:absolute;left:0;top:0;height:100%;background:linear-gradient(90deg,var(--sage),#12b48f)}
.learnrow{border-left:3px solid var(--line);padding:2px 0 2px 12px;margin:10px 0}
.learn-area{font-size:12.5px;font-weight:800;color:var(--ink);margin-bottom:2px}
.learn-q{font-size:12.5px;color:var(--ink3);font-weight:600;margin:2px 0}
.learn-acts{margin:4px 0 0;padding-left:16px;font-size:12.5px;color:var(--t2);line-height:1.7}
.learn-acts li{margin:2px 0}
.learn-acts.reco li{list-style:'✔ ';color:var(--t1)}
.toast{position:fixed;bottom:calc(76px + var(--safe-b));left:50%;transform:translateX(-50%);color:#fff;padding:11px 20px;border-radius:11px;font-weight:700;font-size:13.5px;z-index:200;box-shadow:0 8px 30px rgba(0,0,0,.25);animation:toastIn .2s;max-width:88vw;text-align:center}
@keyframes toastIn{from{opacity:0;transform:translate(-50%,8px)}to{opacity:1;transform:translate(-50%,0)}}
</style>
</head>
<body>
<div id="app">
 <header id="topbar">
  <div class="topbar-row">
   <div class="brand">
    <div class="mark">구암</div>
    <div><b>과목 선택 도우미</b><span>구암고 1,2학년 학생용</span></div>
   </div>
   <div class="gradeToggle" id="gradeToggle">
    <button data-g="1" class="on">1학년</button>
    <button data-g="2">2학년</button>
   </div>
  </div>
 </header>
 <main id="main"></main>
 <nav id="tabbar">
  <button class="nav on" data-page="career"><span class="ic">🧭</span>진로설계</button>
  <button class="nav" data-page="select"><span class="ic">🎯</span>과목선택</button>
  <button class="nav" data-page="track"><span class="ic">🗂️</span>계열</button>
  <button class="nav" data-page="dept"><span class="ic">🎓</span>학과</button>
  <button class="nav" data-page="subject"><span class="ic">📚</span>교과</button>
  <button class="nav" data-page="more"><span class="ic">⋯</span>더보기</button>
 </nav>
</div>

","설명":"치의예과는 치과의사가 되기 위한 기본 교양과 치의학 전공 학습의 기초를 쌓기 위해 다양한 의료인문학 영역과 자연과학 영역의 기본 지식을 익히고 통합하여 치아 및 구강, 얼굴의 질환과 장애, 기형 등을 치료하고 예방하는 전문 인력 양성을 목적으로 하는 학과이다. 예과 2년, 본과 4년, 총 6년 과정 졸업 후 치과의사 국가시험 응시 자격이 주어진다.","전공교과목":"기초과목 일반화학, 일반생물학, 발생학, 일반물리학, 기초물리화학, 유전학, 세포분자생물학, 치의학개론, 초과목 기초유기화학 등 구강해부학, 구강생리학, 치아형태학, 구강익안면외과학, 국소의치의제작,근관치료학,안면동통학, 심화과목   악안면성형외과학, 임상보존학실습, 임상보첨학실습, 치주병학, 치료표정학, 전신마취학,치과면역학, 치과약툴치료학, 치아매식학 등","추천학생":"*사람의 구강 건강 및 치아 관리에 관심이 있고 과학적인 사고 능력을 가진 학생 *과학적 탐구심과 손기술을 지니고, 세부 사항에 예리한 주의를 기울일 수 있는 학생 · 각종 치과 장비를 많이 사용하드로 기계를 잘 다룰 수 있는 학생 * 이론 및 실습을 통한 방대한 학습 분량을 소화할수 있는 학생 〉","유사학과":"치의학과 등 *","진로":"임상치과의사, 연구 및 학계, 공중보건 분야, 의료산업 분야(연구원 등), 기초치의학자 등","일반선택":"대수, 미적분Ⅰ, 확률과 통계, 물리학, 화학, 생명과학 등","진로선택":"기하, 미적분Ⅰ, 기하, 물질과 에너지, 화학 반응의 세계, 세포와 물질대사, 생물의 유전 등","융합선택":"과학의 역사와 문화, 융합과학 탐구 등","계열":"의약학 계열","분야":"의약","일반선택L":["대수","미적분Ⅰ","확률과 통계","물리학","화학","생명과학"],"진로선택L":["기하","미적분Ⅰ","기하","물질과 에너지","화학 반응의 세계","세포와 물질대사","생물의 유전"],"융합선택L":["과학의 역사와 문화","융합과학 탐구"],"개설대학":"서울(경희대, 서울대, 연세대) • 비수도권(국립강릉원주대, 경북대, 단국대(천안), 부산대, 원광대, 전남대, 전북대, 조선대 등)"},{"학과":"한의예과","설명":"한의예과는 한의사가 되기 위한 기본 과정을 배우는 학과로, 한의학에 대한 기초 이론과 실습을 학습하며, 이후 한의과대학 본과로 진학하여 전문 과정을 이수하는 학과이다. 한약 및 침구 치료, 그리고 다양한 전통 의학적 접근 방식을 연구하고 실습하는 것이","전공교과목":"일반생물학, 일반화학, 생화학, 생리학, 미생물학, 경서강독, 기초중국어, 한의학용어, 동양철학, 기초파목 . 금의학개론,한의학한문, 한의철학, 의학영어 등 십회과묵 며미학.진단학, 약리학, 본초하,악용식둘학 조직하, 해부학 방제히[처방학, 경험, 내가, 짐구과, 부인과, 소아과, 신경정신과, 이비인후과, 사상체질의학 등","추천학생":"*생명과학, 화학과 같은 자연과학 기초를 배우고 이를 한의학에 적용해야 하므로 탐구심이 강한 학생 · 서양의학과는 다른 한의학의 이론과 치료 방법도 배우드로 전통 의학과 자연 치료에 관심 있는 학생 · 한자로 된 한의학 전공 서적을 수원하게 볼 만큼 한자에 대한 지식이 품부한 학생 〉","유사학과":"한의학과등 *","진로":"의학연구원, 한의사 등","일반선택":"대수, 미적분Ⅰ, 물리학, 화학, 생명과학, 현대사회와 윤리, 미적분Ⅰ, 물질과 에너지, 화학 반응의 세계 등","진로선택":"기하, 미적분Ⅱ, 물질과 에너지, 화학 반응의 세계, 세포와 물질대사, 생물의 유전 등","융합선택":"과학의 역사와 문화 등","계열":"의약학 계열","분야":"의약","일반선택L":["대수","미적분Ⅰ","물리학","화학","생명과학","현대사회와 윤리","미적분Ⅰ","물질과 에너지","화학 반응의 세계"],"진로선택L":["기하","미적분Ⅱ","물질과 에너지","화학 반응의 세계","세포와 물질대사","생물의 유전"],"융합선택L":["과학의 역사와 문화"],"개설대학":"서울(경희대) • 수도권(가천대) • 비수도권( :"미술교육과","설명":"회화, 조소, 디자인, 공예 등 다양한 미술 실기와 미술 이론, 미술 지도 방법을 익히고, 교육학적 지식을 겸비하여 창의적이고 효과적인 미술 교육을 실천하는 미술 교사를 양성하는 학과이다.","전공교과목":"기초드로잉 및 희화, 기초 조형, 기초 조소 및 입체 표현, 기초 디자인, 색채학, 미술사, 미학, 교육학 개론, 미술교육학개론 등 현대 회화 및 표현 연구, 입체 조형 및 설치미술, 판화 및 공예 교육, 미술교과교육론, 미술 교수-학습 방법론 등 전공 기초 전공심화","추천학생":"가르치는 것을 좋아하고, 교육에 흥미가 있는 학생 *미술 전반(회화, 조소, 공예, 디자인 등)에 폭넓은 관심을 지닌 학생 *소통 능력이 뛰어나고, 사람들과 교류하는 것을 즐기는 학생 · 창의적인 수업 방식이나 새로운 교육 방법에 흥미가 있는 학생","유사학과":"응용미술교육과 *","진로":"미술 창작 분야(미술 작가, 출판-교육용 삽화가 등) * 예술계(문화예술 기획사(큐레이터), 미술 관련 저널리스트 등)","일반선택":"화법과 언어, 독서와 작문, 문학, 영어 독해와 작문, 세계사, 사회와 문화, 현대사회와 윤리, 미술 등","진로선택":"주제 탐구 독서, 법과 사회, 인문학과 윤리, 미술 창작, 미술 감상과 비평, 인간과 심리, 교육의 이해 등","융합선택":"매체 의사소통, 미디어 영어, 세계 문화와 영어, 여행지리 등","계열":"예술 계열","분야":"예체능","일반선택L":["화법과 언어","독서와 작문","문학","영어 독해와 작문","세계사","사회와 문화","현대사회와 윤리","미술"],"진로선택L":["주제 탐구 독서","법과 사회","인문학과 윤리","미술 창작","미술 감상과 비평","인간과 심리","교육의 이해"],"융합선택L":["매체 의사소통","미디어 영어","세계 문화와 영어","여행지리"],"개설대학":"서울(한양대) • 비수도권(경남대, 경상국립대, 국립공주대, 목원대, 한국교원대, 한남대 등) ·교육계(미술교사, 대학교수, 미술치료사, 박물관·미술관교육사, 미술교육콘텐츠개발자등)"},{"학과":"성악과","설명":"인간의 목소리를 예술적 표현 도구로 삼아 음익을 창조하고 연구하는 학문을 다루는 학과이다. 또한 올바른 발성과 호흡법을 익히고 음익적 해석 능력과 무대 표현력을 길러 전문적인 성악가 및 음악 교육자 등으로 성장할 수 있도록 교육한다.","전공교과목":"[-그 전공 기초 합창, 전공 실기, 연주, 시창-청음, 음악 기초 이론 등 전공 심화 이태리어 딕션, 독일어 딕션, 프랑스어 딕션, 성악 앙상블, 오페라 코칭, 오페라사, 현대 가곡, 전공 영미 가곡, 프랑스 가곡, 서양음악사, 화성학, 대위법 등","추천학생":"*노래를 통해 감정을 표현하는 것을 좋아하고 무대에서 자신의 목소리로 감동을 전하고 싶은 학생 *음악적 김각과 예술적 창의력을 바탕으로 성악을 전문적으로 배우고 싶은 학생 *체계적인 성악 교육을 통해 전문 성악가, 음악 교육자 또는 연구자로 성장하고 싶은 학생 *꾸준한 연습과 노력으로 자신의 목소리를 발전시키고 음악적 기량을 전문적으로 탐구하고 싶은 학생 〉","유사학과":"음악학부 성악 전공, 음익학과 성악 전공, 예술학부성악전공, 교회음악과 성악전공 *","진로":"전문성악연주자 * 국내 유명 단체(국립합창단, 시립합창단 등) 음악활동 * 중·고등학교 음악교사 또는 대학교수/강사 * 공연예술 분야 관련 기획 * 공연예술 분야 관련 단체 경영 * 음악 치료사(심리치료와 결합된 예술치료 분야)","일반선택":"화법과 언어, 독서와 작문, 문학, 영어 독해와 작문, 사회와 문화 등","진로선택":"주제 탐구 독서, 심화 영어, 법과 사회, 윤리와 사상, 음악 연주와 창작, 음악 감상과 비평 등","융합선택":"매체 의사소통, 미디어 영어, 세계 문화와 영어, 여행지리 등","계열":"예술 계열","분야":"예체능","일반선택L":["화법과 언어","독서와 작문","문학","영어 독해와 작문","사회와 문화"],"진로선택L":["주제 탐구 독서"," 히 강화해야 합니다."],"출처":"서울시교육청교육연구정보원 「2022 개정 교육과정 계열별 선택과목 안내」 기반 · 2028학년도 대입 및 구암고 편제 기준 재정리·보강"},"자율전공·자유전공":{"계열":"자율전공·자유전공","분야":"자율/첨단","관련학과":["계약학과","첨단학과","자유전공학부","열린전공학부","인문기술융합학부","AI기반자유전공학부","글로벌자유전공학부","광역(인문·자연·공학 등)"],"일반선택":["화법과 언어","독서와 작문","대수","미적분Ⅰ","확률과 통계","영어Ⅰ","영어Ⅱ","영어 독해와 작문","사회와 문화","현대사회와 윤리"],"진로선택":["주제 탐구 독서","영어 발표와 토론","미적분Ⅱ","기하","정치","법과 사회","경제","물질과 에너지","화학 반응의 세계","세포와 물질대사"],"융합선택":["독서 토론과 글쓰기","사회문제 탐구","실용 통계","융합과학 탐구","수학과제 탐구"],"한줄소개":"입학 후 전공을 자유롭게(또는 계열·단과대 광역 범위에서) 선택하는 제도로, 진로 탐색의 유연성과 기초 학업 역량을 함께 요구하는 모집단위입니다.","핵심역량":["탄탄한 국어·수학·영어 기초 학업 역량","자기주도적 학습·탐색 능력","분야를 넘나드는 지적 호기심","진로 설계와 의사결정 능력"],"진출분야":["입학 후 자유 전공 선택(인문·사회·자연·공학 등)","융합·첨단 분야","복수전공·연계전공","진로 탐색 후 세부 전공 결정"],"추천활동":["관심 분야에 깊이 몰입한 탐구 경험 축적","인문·자연 경계를 넘는 융합 독서·프로젝트","진로 탐색 과정과 변화·성장의 기록","기초 교과(국·수·영) 내실 있는 학습"],"전공선택Tip":["유형① 전공 100% 자율 선택형은 특정 과목 이수 여부보다 자기주도적 학습 경험과 기초 학업 역량을 최우선으로 평가합니다. 지원 시점에 진로가 명확하지 않거나 변경되어도 불이익이 없으나, 성실한 학교생활을 바탕으로 관심 분야에 깊이 몰입했거나 인문·자연을 넘나드는 지적 호기심을 증명한 학생에게 적합합니다.","유형② 계열·단과대 광역 모집형은 기초 교과 역량과 계열별 특성을 고려한 전략적 과목 선택이 필수입니다. 국·수·영 기초 학업 역량은 기본이며, 인문계열 광역은 국·수·영의 고른 이수와 사회 교과 탐구를, 자연계열 광역은 수학 심화 이수와 과학 교과(물리·화학·생명과학 등) 선택을 권장합니다.","전공자율선택제는 전공 선택권을 넓게 보장하지만 대학별 운영 방식(전공 진입 시기·조건, 성적순 인원 제한, 다전공 의무화 등)에 차이가 있으므로, 지원 전 대학별 학사 운영 규정을 반드시 확인해야 합니다.","참고: 열린전공학부(자연) 최종 합격자 기준으로 화학·물리학 이수 비율이 높게 나타나며, 자연 광역 지원 시 물리학·화학 이수가 유리하게 작용하는 경향이 있습니다."],"출처":"서울시교육청교육연구정보원 「2022 개정 교육과정 계열별 선택과목 안내」 기반 · 2028학년도 대입 및 구암고 편제 기준 재정리·보강"}},"content":{"커리어넷검사":[{"name":"직업흥미검사(H)","목적":"자신이 어떤 종류의 일에 얼마나 흥미를 느끼는지 알아봄으로써 자신에게 알맞은 직업을 탐색","특징":"홀랜드(Holland) 흥미 유형 기반, 일상 활동 중 흥미를 측정","url":"https://www.career.go.kr/cloud/w/inspect/holland/intro","대상":"중1~고3"},{"name":"직업적성검사","목적":"직업과 관련된 다양한 잠재적 능력을 어느 정도 가지고 있는가를 스스로 진단하여 진로·직업세계 탐색","특징":"총 11개 직업적성(신체운동, 손재능, 공간지각력, 음악, 창의력, 언어, 수리·논리, 자기성찰, 대인관계, 자연친화, 예술시각 능력)","url":"https://www.career.go.kr/cloud/w/inspect/vocation/intro","대상":"중1~고3"},{"name":"직업가치관검사","목적":"직업을 선택할 때 어떤 가치를 중요하게 여기는지 알아봄","특징":"총 12개 직업가치(안정성, 보수, 일과 삶의 균형, 성취, 사회적 인정, 사회봉사, 자율성 등)","url":"https://www.career.go.kr/cloud/w/inspect/value2/intro","대상":"중1~고3"}],"진로설계이론":{"자기이해":"진로·진학 방향 설정의 첫걸음은 '자기 이해'다. 자신의 흥미·적성·가치관·성격을 깊이 탐색하고, 자신만의 특성을 바르게 인지하는 것이 진로 탐색의 출발점이다. 진로심리검사는 이러한 내면 특성을 객관적으로 파악하여 미래 삶의 방향을 설정하는 기준점이 된다.","로드맵":"진로·진학·학업 설계 로드맵은 2022 개정 교육과정의 핵심인 '학생 주도성'과 '진로·진학 연계'를 지원한다. 1학년은 진로 인식·기초 상담과 자기 이해, 2학년은 진로 흥미를 반영한 과목 선택과 심화 탐구, 3학년은 성적 분석 기반 대입 지원 전략 확정으로 이어진다.","직업정보":"직업정보는 해당 직업이 어떤 일을 하는지, 어떤 능력·적성이 필요한지, 어떤 환경에서 일하는지를 알려 준다. 이를 통해 구체적이고 현실적인 진로 설계가 가능하다.","학과정보":"학과는 그 분야에서 배우고 경험할 내용을 구체적으로 알려 주므로, 학생이 자신의 흥미와 적성에 맞는 학과를 탐색하는 것이 진학 설계의 핵심이다.","설계원칙":["[역량 신장] 과목 예시는 참고 자료일 뿐, 수업 내 다양한 학습 활동에 주체적으로 참여하여 자신만의 실질적 역량을 스스로 증명해야 함","[환경 개척] 제한된 여건에 수동적으로 머물기보다 배움의 기회를 적극 탐색하고 필요한 학습 경로를 주도적으로 찾아 활용","[성장 증명] 단순 이수에 그치지 않고 선택의 이유와 탐구의 흔적을 쌓아 나만의 차별화된 성장 이야기를 만들어야 함"]},"서울대연계":{"개요":"서울대는 2022 개정 교육과정 취지를 반영해 고교-대학 연계를 강화하고, 기존 '교과이수기준 Ⅰ·Ⅱ'와 '전공 연계 교과이수 과목'을 통합·단순화하여 최소한의 권장과목을 제시. 권장과목 이수 여부는 수시 서류평가·정시 교과역량평가에 반영됨.","유형1":{"대상":"인문대·사회과학대·간호대·경영대·농생대(농경제)·사범대(교육/국어/영어/독어/불어/사회/역사/지리/윤리교육)·생활과학대(소비자아동/식품영양/의류)","권장":"제2외국어/한문 교과(군)에서 1과목 이상"},"유형2":{"대상":"자연과학대·간호대·공과대·농생대·사범대(수학/물리/화학/생물/지구과학교육)·생활과학대(식품영양/의류)·수의대·약대·의대·첨단융합학부·치의학대학원 치의학과","수학":"기하, 미적분Ⅱ (단, 간호대·치의학과는 기하 또는 미적분Ⅱ)","과학":"진로 선택 과목 중 3과목 이상 (단, 의대는 '세포와 물질대사'·'생물의 유전' 포함 3과목 이상)","우선권장":{"물리학":"물리·천문학부 물리학전공, 기계공학부, 전기정보공학부, 원자핵공학과, 조선해양공학과, 항공우주공학과, 물리교육과","화학":"화학부, 화학교육과","생명과학":"생명과학부, 생물교육과, 의과대학","지구과학":"천문학전공, 지구환경과학부, 지구과학교육과"}},"유형별없음":"권장과목을 별도 제시하지 않은 모집단위는 진로·적성에 기반하여 과목을 선택·이수하기를 권장(음악대·미술대·체육교육과·학부대학 등)."},"대학별권장요약":[{"대학":"서울대","계열":"공통","요약":"2022 개정 교육과정 취지를 반영해 '교과이수기준'과 '전공 연계 교과이수 과목'을 통합·단순화한 최소 권장과목 제시. 권장과목 이수 여부는 수시 서류평가·정시 교과역량평가에 반영.","자연":"[유형②] 수학은 기하·미적분Ⅱ, 과학은 진로선택 3과목 이상. 물리학 우선(기계·전기정보·원자핵·조선해양·항공우주공학부), 화학(화학부·화학교육과), 생명과학(생명과학부·생물교육과·의대), 지구과학(천문학전공·지구환경과학부). 약대는 화학 또는 생명과학. 의대는 '세포와 물질대사'·'생물의 유전' 포함 3과목 이상.","인문":"[유형①] 인문대·사회과학대·경영대·간호대·사범대(교육·국어·영어·사회·역사·지리·윤리교육 등)·생활과학대(소비자아동·식품영양·의류)는 제2외국어/한문 교과(군)에서 1과목 이상 권장.","비고":"미술대·음악대·체육교육과·학부대학(유형③)은 별도 권장과목 없이 진로·적성에 따라 폭넓게 이수 권장."},{"대학":"경희대","계열":"자연","요약":"2028 자연계열 모집단위 교과 이수 권장(예고, 2025.3.31 사전예고·2026.3.31 최종확정). 수학은 대체로 대수·미적분Ⅰ·확률과통계·미적분Ⅱ·기하를 핵심과목으로 권장.","자연":"수학·응용수학과: 대수·미적분Ⅰ·확률과통계·미적분Ⅱ·기하 / SW융합·인공지능·컴퓨터공학: +인공지능수학 / 물리학과: 물리학·역학과에너지·전자기와양자(+화학·물질과에너지) / 기계공학부: 물리학·화학·역학과에너지·전자기와양자 / 화학과: 화학·물질과에너지·화학반응의세계 / 의예과: 화학·생명과학·물질과에너지·화학반응의세계·세포와물질대사·생물의유전 / 한의예·치의예: 화학·생명과학·세포와물질대사·생물의유전 / 간호학과: 대수·미적분Ⅰ·확률과통계(+미적분Ⅱ), 생명과학·세포와물질대사·생물의유전.","인문":"경희대 인문계열은 자연계열과 달리 필수 핵심과목을 별도 지정하지 않으며, 지원 전공의 기초가 되는 국어·영어·사회(사회문화·경제·정치와법 등)·제2외국어 교과를 균형 있게 이수할 것을 권장.","비고":"자연계열 교과 이수 권장은 2025.3.31 사전예고 → 2026.3.31 최종확정 예정.","출처보강":true},{"대학":"동국대","계열":"공통","요약":"2028 대입 대비 모집단위별 '전공 관련 교과영역'을 자체 기준으로 안내(이수 필수 아님, 기초 학업역량+전공 소양 관점). 상경계열은 수학 영역을 전공 관련 교과로 설정.","자연":"수학·과학 기초학업역량이 곧 전공 수학 역량(미적분·확률과통계·기하 + 물리학·화학 등). 화공생물공학과: 수학·물리학·화학·생명과학 / 전자전기공학부: 수학·물리학·화학 / 컴퓨터AI학부: 수학 / 약학과: 수학·화학·생명과학 / 바이오시스템대학: 수학·화학·생명과학. 최종합격자는 화학·물리학 이수 비율이 높음.","인문":"전공별 관련 교과영역 예시 — 국어국문·문예창작: 국어·역사·사회문화·한문 / 사학과: 국어·역사·한문 / 철학과: 국어·윤리·한문·철학·논리학 / 법학과: 국어·역사·윤리·정치와법 / 경제학과: 국어·수학·영어·경제 / 경영학과: 국어·수학·영어·사회문화·경제.","비고":"동국대는 2025~2026 고교교육 기여대학 지원사업(전형 운영 개선)에 선정되어 정시 비중을 30% 수준으로 조정할 계획으로 알려져, 학생부 중심의 교과 이수 설계가 더 중요해짐.","출처보강":true},{"대학":"숙명여대","계열":"공통","요약":"41개 학과(전공)를 9개 범주로 구분해 범주별 권장과목을 '진로진학 학과탐색 가이드'로 제시.","자연":"관련 범주 — 화학·생명과학·환경/생활과학(화학과·생명시스템학부·식품영양학과), 수학/컴퓨터(수학과·통계학과·인공지능공학부·컴퓨터과학·데이터사이언스), 공학(첨단공학부), 약학·한약학(약학부).","인문":"관련 범주 — 언어·문학/인문학(한국어문·역사문화·영어영문·중어중문 등), 사회과학/교육/법학(교육학부·정치외교·행정·사회심리·법학부·미디어학부), 경영·경제(경영학부·경제학부·홍보광고·소비자경제 등).","비고":"어느 범주에도 속하지 않는 자유전공학부(N.C.E)는 계열 무관 폭넓은 이수 권장."},{"대학":"건국대","계열":"공통","요약":"KU:PICK(이수추천과목) — 기초학력 확보를 위한 일반선택과목 이수를 강조하고, 진로·적성에 맞춘 진로선택·융합선택 이수를 권장하는 포괄적 가이드라인. 자율성을 존중하며 수업 내용·수강 태도를 학생부 위주 전형에 반영.","자연":"KU:PICK 전공별 예시 — 수학·SW융합·인공지능·컴퓨터공학: 수학 중심 / 화학·화공·신소재·원자력: 물리학+화학(응용화학 등은 생명과학 권장) / 건축공학·건축학: 물리학 / 메디컬 계열: 물리학 / 지리·우주과학: 지구과학+화학 / 자연계 일반: 수학+물리·화학 중심.","인문":"인문·사회계열은 필수 지정 과목 없이 전공 기초가 되는 국어·영어·사회 교과를 폭넓게 이수하도록 권장.","비고":"KU:PICK은 강제 이수 기준이 아닌 이수 추천 가이드로, 수업 내용·수강 태도가 학생부 위주 전형에 반영됨.","출처보강":true}],"수능4교시현황":{"설명":"수능 4교시 사회·과학탐구 선택과목 연도별 응시 현황 (총 응시인원=각 탐구과목 응시인원의 합, 비율=각 과목응시/총응시×2)","표":[["구분","2022","2023","2024","2025접수"],["생활과윤리","20.39%","21.60%","20.99%","23.69%"],["윤리와사상","4.82%","5.35%","5.63%","6.12%"],["한국지리","6.29%","5.35%","4.93%","5.27%"],["세계지리","4.61%","3.95%","3.89%","4.43%"],["동아시아사","3.46%","3.11%","2.66%","2.63%"],["세계사","2.68%","2.54%","2.37%","2.37%"],["경제","0.87%","0.81%","0.82%","0.95%"],["정치와법","3.96%","3.96%","3.79%","4.48%"],["사회문화","18.86%","19.07%","18.38%","23.89%"],["물리학Ⅰ","8.72%","8.82%","9.05%","8.23%"],["화학Ⅰ","10.19%","9.94%","8.37%","6.30%"],["생명과학Ⅰ","18.83%","19.88%","20.91%","18.21%"],["지구과학Ⅰ","19.00%","20.50%","22.10%","19.88%"],["물리학Ⅱ","0.47%","0.42%","0.62%","0.81%"],["화학Ⅱ","0.51%","0.44%","0.58%","0.82%"],["생명과학Ⅱ","1.00%","0.78%","0.89%","1.06%"],["지구과학Ⅱ","0.55%","0.43%","0.64%","0.67%"]],"총응시":{"2022":"392,390","2023":"386,308","2024":"383,532","2025접수":"387,242"}},"등급변환표":{"9to5분포":[["1등급","4%","1등급"],["2등급","11%","1등급"],["3등급","23%","2등급"],["4등급","40%","2등급"],["5등급","60%","3등급"],["6등급","77%","4등급"],["7등급","89%","4등급"],["8등급","96%","5등급"],["9등급","100%","5등급"]],"5등급분포":[["1등급","10%","누적10%"],["2등급","24%","누적34%"],["3등급","32%","누적66%"],["4등급","24%","누적90%"],["5등급","10%","누적100%"]],"설명":"2028 대입부터 내신 5등급제 시행(현 1학년). 졸업생(2021~2025 대입)의 9등급 성적은 상대적 석차 백분위 기준으로 5등급 환산하여 비교."},"링크":{"진로설계":[{"name":"커리어넷 진로심리검사","url":"https://www.career.go.kr/cloud/w/inspect/student"},{"name":"서울진로진학정보센터","url":"https://www.jinhak.or.kr/"},{"name":"진학정보실(진학닷컴)","url":"https://jinhak.esteacher.kr/"},{"name":"대입정보포털 어디가","url":"https://www.adiga.kr/"}],"과목선택":[{"name":"진학정보실 - 과목선택","url":"https://jinhak.esteacher.kr/jinrodesign.html#self"},{"name":"서울진로진학정보센터","url":"https://www.jinhak.or.kr/"},{"name":"대입정보포털 어디가","url":"https://www.adiga.kr/"},{"name":"고교학점제 안내","url":"https://www.hscredit.kr/"}],"계열학과":[{"name":"진학정보실 학과정보","url":"https://jinhak.esteacher.kr/2025uni.html"},{"name":"커리어넷 학과정보","url":"https://www.career.go.kr/cloud/w/deptview"},{"name":"대입정보포털 어디가","url":"https://www.adiga.kr/"},{"name":"워크넷 학과정보","url":"https://www.work.go.kr/"}],"교과":[{"name":"진학정보실","url":"https://jinhak.esteacher.kr/"},{"name":"구암고 리로스쿨 기출문제","url":"https://guahm.riroschool.kr/board_msg.php?db=1905"},{"name":"EBSi 수능 기출","url":"https://www.ebsi.co.kr/"},{"name":"에듀넷 교과서","url":"https://www.edunet.net/"}]}},"guide":{"제목":"선생님들이 들려주는 선택과목 가이드","부제":"1학년 학생을 위한 교과별 선택 조언 (구암고 교사 안내)","교과":[{"이모지":"🇬🇧","교과":"영어 교과 안내","항목":[{"제목":"영어 선택은 1학기보다 2학기에 집중하세요","내용":"2·3학년 1학기에는 '영어Ⅰ'과 '영어Ⅱ'가 각각 4학점 필수 과목으로 지정되어 있습니다. 따라서 1학기에는 무리해서 영어 선택과목을 추가할 필요가 없습니다. 다만 2학기에는 필수 지정 과목이 없으므로, 수능까지 꾸준한 영어 감각을 유지하기 위해 선택과목을 하나쯤 지정해 수강하는 것을 강력히 추천합니다."}]},{"이모지":"📐","교과":"수학 교과 안내","항목":[{"제목":"공학 계열 지원자라면 '기하'는 필수입니다","내용":"이공계, 특히 공학 계열 지원자에게는 대학 전공 수업의 기초가 되는 '벡터' 개념이 필수적입니다. 무엇보다 학종(학생부종합전형)에서 입학사정관은 학교에 개설된 과목 현황을 모두 확인합니다. 학교에 엄연히 개설된 '기하' 과목을 기피한 흔적은 수시 전형에서 불리하게 작용할 수 있으니, 진로가 공학 쪽이라면 반드시 수강하세요."},{"제목":"'경제수학', 만만하게 보면 큰코다칩니다","내용":"경제수학은 사회과의 '경제' 과목과는 결이 다릅니다. 수열·함수·미분 등 순수 수학 이론의 비중이 높게 구성된 엄연한 수학 교과입니다. 평소 수학에 대한 흥미와 기초가 부족하다면 실제 학습과 내신 평가 과정에서 어려움을 겪을 수 있으니 신중하게 선택해야 합니다."}]},{"이모지":"🧪","교과":"과학 교과 안내","항목":[{"제목":"핵심 과목은 2학년 때 미리 이수하세요","내용":"3학년 1학기가 되면 물리·화학·생명과학·지구과학 중 일부 과목은 학생 선택 인원 미달로 개설되지 않거나, 2학년과 같은 교실에서 수강해야 할 수 있습니다(성적 처리도 2학년과 함께 함). 따라서 자신의 진로와 직결되는 가장 중요한 핵심 과목은 2학년 때 우선 신청하여 안정적으로 수강하는 전략이 필요합니다."},{"제목":"내용 흐름을 고려한 권장 수강 순서(위계)","내용":"새 교육과정에서 과학 진로 과목 간 법적 이수 순서가 엄격히 정해진 것은 아닙니다. 하지만 개념의 이해와 연결성을 고려할 때, 아래 순서대로 수강하지 않으면 상위 내용 학습 시 심화 개념 이해에 불이익을 받을 수 있습니다.","위계":[["물리학 라인","물리학 → 역학과 에너지 → 전자기와 양자"],["화학 라인","화학 → 물질과 에너지 → 화학반응의 세계"],["생명과학 라인","생명과학 → 세포와 물질대사 → 생물의 유전"],["지구과학 라인","지구과학 → 지구시스템과학 → 행성우주과학"]]}]},{"이모지":"🌏","교과":"제2외국어/정보(대학) 교과 안내","항목":[{"제목":"2028 수시는 '정성평가(서류)'가 확대됩니다","내용":"2028학년도 대입은 학생부 서류의 정성평가 비중이 커져 '무엇을·왜 선택했는가'가 중요해집니다. '정보'와 '제2외국어'는 대부분 대학에서 수능 필수가 아니므로, 정시보다 수시(학종·교과)에서 이수 여부와 전공적합성으로 평가됩니다. 구암고는 재학생의 90% 이상이 수시로 진학하는 일반고이므로, 두 과목은 '수능 부담'이 아니라 '학교생활기록부의 강점'을 만드는 관점에서 선택하는 것이 유리합니다."},{"제목":"표 보는 법 — 신뢰도 표기 안내 (중요)","내용":"학과 단위까지 공식 확정한 곳은 서울대뿐이므로, 각 칸에는 신뢰도를 함께 표기했습니다. [확정]=대학이 공식 발표한 전공연계 권장/미지정 사실, [권장]=대학 발표자료·설명회에서 권장 수준으로 안내, [추정]=학과단위 기준 미발표 상태에서 정성평가·전공적합성 기조에 근거한 전략적 판단. [추정] 항목은 방향성 참고용이며, 지원 직전 각 대학 최신 모집요강으로 반드시 재확인하세요."},{"제목":"① 제2외국어 — 대학군 × 계열 × 학과군 수시 선택 전략","표":{"head":["대학군","어문·통번역·국제·지역학","인문·사회·상경·교육","자연·공학·의약","근거"],"rows":[["서울대","제2외국어/한문 1과목 이상 이수 (전공연계 권장과목=사실상 필수) [확정]","인문·사회 모집단위도 제2외국어/한문 1과목 이상 권장 [확정]","제2외국어 권장 없음 — 수학(기하·미적분Ⅱ)·과학 중심 [확정]","서울대 「2028 이후 전공연계 교과이수 안내」"],["연세대·고려대","전공연계 지정과목 없음 [확정·미지정]. 어문·지역학 지망 시 이수하면 서류 정성평가에 유리 [추정]","지정 없음 [확정]. 진로·적성 따라 선택 [권장]","제2외국어 권장 없음 [확정]","연세대 2028 전공연계 안내, 고려대 2028 권장과목 안내"],["서강·성균관·한양·중앙·경희·한국외대·서울시립","한국외대 어문·통번역·국제계열은 강하게 권장 [권장]; 그 외 대학 어문·국제계열도 이수 권장 [추정]","필수 아님 — 이수 시 전공적합성 긍정요소 [추정]","필수 아님(대다수 미지정) [확정]","각 대학 2028 전형계획·학종 서류평가 기조, 한양대 「2028 신입학 전형계획」"],["건국·동국·홍익·국민·숭실·세종·단국, 여대","어문·국제·관광·교육계열 이수 시 유리 [추정]","필수 아님, 정성평가 긍정 요소 [추정]","필수 아님 [추정]","대학별 2028 전형계획·모집요강(발표 시 확인)"],["경기권(아주·인하·가천 등)","어문·국제계열 권장 [추정]","필수 아님(아주대는 인문·사회에도 수학 권장) [권장]","필수 아님 [추정]","아주대·인하대·숭실대 공동 「2028 선택과목 가이드북」"],["그 외(지방거점국립대 등)","권장 수준, 미이수 직접 감점 사례는 드묾 [추정]","필수 아님 [추정]","필수 아님 [추정]","「2028 모집단위별 반영과목·대학별 권장과목」 자료집 등"]]},"출처":"출처: 서울대 「2028학년도 이후 전공 연계 교과이수 과목 안내」 / 연세대 「2028학년도 대입전형 기본계획·전공연계 교과이수 안내」(admission.yonsei.ac.kr) / 고려대·성균관대·한양대(「2028 신입학 전형계획」, 2025.4.30) 등 2028 전형계획 / 아주대·인하대·숭실대 공동 「2028 대입 선택과목 가이드북」 / 교육부 「2028 대학입시제도 개편 확정안」(학생부 서류 정성평가 확대) / 서울시교육청교육연구정보원 「2022 개정 교육과정 계열별 선택과목 안내」 · 학과 단위 세부기준을 공식 확정한 곳은 서울대뿐이며 나머지는 '권장·추정'이므로 지원 전 각 대학 최신 모집요강을 반드시 확인"},{"제목":"② 정보 — 대학군 × 계열 × 학과군 수시 선택 전략","표":{"head":["대학군","컴퓨터·SW·AI·데이터·정보보안","전자·정보통신·반도체·공학","자연·상경(데이터 활용)","인문·사회·어문·교육"],"rows":[["서울대","정보 명시 지정 없음 — 수학(미적분Ⅰ·Ⅱ·확률과통계) 중심 [확정]. '정보'+'인공지능기초/데이터과학' 이수 시 세특 긍정 [추정]","수학·과학 중심 [확정]; /* ============ 로컬 저장 (본인 선택만, 개인 식별정보 없음) ============ */
const LSKEY='guam_subject_helper_v1';
let mem=null;
function store(){
 if(mem) return mem;
 try{ const raw=localStorage.getItem(LSKEY); mem=raw?JSON.parse(raw):{selections:{}}; }
 catch(e){ mem={selections:{}}; }
 mem.selections=mem.selections||{};
 return mem;
}
function save(s){ mem=s; try{ localStorage.setItem(LSKEY, JSON.stringify(s)); }catch(e){} }
function getSelection(grade){ const s=store(); return s.selections[grade]||null; }
function setSelection(grade,data){ const s=store(); s.selections[grade]=data; save(s); }
function clearAllData(){ try{localStorage.removeItem(LSKEY);}catch(e){} mem=null; }

let ST={ grade:1 };

/* ============ 공통 유틸 ============ */
function $(s,r){return (r||document).querySelector(s);}
function $$(s,r){return [...(r||document).querySelectorAll(s)];}
function el(tag,cls,html){const e=document.createElement(tag); if(cls)e.className=cls; if(html!=null)e.innerHTML=html; return e;}
function esc(s){return String(s==null?'':s).replace(/[&<>"]/g,m=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[m]));}
function subjGun(name){ const m=DB.subject_master[name]; if(m)return m['교과군'];
 const n=name.replace(/\s/g,''); for(const k in DB.subject_master){ if(k.replace(/\s/g,'')===n)return DB.subject_master[k]['교과군']; } return ''; }
function subjType(name){ const m=DB.subject_master[name]; if(m)return m['유형']||''; const n=name.replace(/\s/g,''); for(const k in DB.subject_master){ if(k.replace(/\s/g,'')===n)return DB.subject_master[k]['유형']||''; } return ''; }
/* 2022 개정 교육과정(2025년 입학생부터 적용) 실제 평가방식 규정 기반
   - 공통·일반선택·진로선택: 5등급 상대평가 + 성취도(A~E) 병기
   - 융합선택: 원칙적으로 5등급 상대평가, 단 '사회·과학' 교과의 융합선택 9과목만 절대평가(석차등급 미기재)
   - 체육·예술 교과(군), 과학탐구실험1·2: 유형과 무관하게 3단계 성취도(A/B/C)만, 등급 없음
   - 교양 교과(군): P(이수)만 표기, 등급 없음 */
function subjEval(name){
 const gun=subjGun(name), typ=subjType(name), sn=name.replace(/\s/g,'');
 if(sn==='과학탐구실험1'||sn==='과학탐구실험2') return '3단계 성취도(A·B·C) — 석차등급 없음 (예외 과목)';
 if(gun==='체육'||gun==='예술') return '3단계 성취도(A·B·C) — 석차등급 없음 (체육·예술 교과군)';
 if(gun==='교양') return 'P(이수) — 석차등급·성취도 등급 없음 (교양 교과군)';
 if(typ==='융합'&&(gun==='사회'||gun==='과학')) return '성취도(A~E) 절대평가 — 석차등급 없음 (사회·과학 융합선택)';
 return '5등급 상대평가 + 성취도(A~E) 병기';
}
function toast(msg,kind){ const t=el('div','toast', esc(msg)); t.style.background=(kind==='err'?'var(--red)':kind==='ok'?'var(--sage-d)':'var(--ink)'); document.body.appendChild(t); setTimeout(()=>t.remove(),2200); }

function openModal(title, bodyHTML, footHTML){
 $('#modal').innerHTML=`<div class="modal-grip"></div><div class="modal-h"><h3>${title}</h3><button class="x" onclick="closeModal()">✕</button></div><div class="modal-b">${bodyHTML}</div>${footHTML?`<div class="modal-f">${footHTML}</div>`:''}`;
 $('#modalBg').classList.add('show');
 $('.modal-b').scrollTop=0;
}
function closeModal(){ $('#modalBg').classList.remove('show'); }
$('#modalBg').addEventListener('click',e=>{ if(e.target.id==='modalBg') closeModal(); });

 w.document.write(`<html><head><meta charset="utf-8"><title>${title}</title><style>body{font-family:'Pretendard Variable',sans-serif;padding:28px;color:#1c2b39;line-height:1.6}h1{font-size:19px;margin-bottom:10px}h2{font-size:14px;margin:16px 0 6px;color:#16324f}table{border-collapse:collapse;width:100%;font-size:12px;margin-top:8px}th,td{border:1px solid #ccc;padding:5px 8px;text-align:left}p{font-size:13px;margin:4px 0}ul{padding-left:18px}</style></head><body>${html}<script>window.print()<\/script></body></html>`);
 w.document.close();
}

const PAGES={};
let curPage='career';
function go(page){
 curPage=page;
 $$('#tabbar button').forEach(b=>b.classList.toggle('on', b.dataset.page===page || (page==='more' && b.dataset.page==='more')));
 const p=el('div','page');
 $('#main').innerHTML=''; $('#main').appendChild(p);
 (PAGES[page]||PAGES.career)(p);
 window.scrollTo(0,0);
}
$$('#tabbar button').forEach(b=>b.addEventListener('click',()=>go(b.dataset.page)));

/* 학년 토글 */
$('#gradeToggle').addEventListener('click',e=>{
 const b=e.target.closest('button'); if(!b)return;
 ST.grade=+b.dataset.g;
 $$('#gradeToggle button').forEach(x=>x.classList.toggle('on',x===b));
 if(curPage==='select'||curPage==='career')go(curPage);
});

function isDone2Complete(){

  const picks=SEL.done2[sk]||[];

  const cntOk=nonArtCnt===sem['택'];

  return cntOk&&artOk;
 });
}

/* 졸업요건 체크 (2학년은 실제 2학년 이수과목도 함께 반영) */
function checkGraduation(){
 let all=fixed2All();
 Object.keys(SEL.picks).forEach(sk=>{ all=all.concat(SEL.picks[sk]||[]); });
 const rules=DB.offerings['졸업규칙'];
 const ksy=all.filter(isKSY);
 const req=all.filter(isReqGroup);
 const artIn3 = (SEL.picks['3-1']||[]).concat(SEL.picks['3-2']||[]).filter(s=>subjGun(s)==='예술');
 const dup=all.filter((s,i)=>all.indexOf(s)!==i);
 const results=[];
 results.push({ok:ksy.length<=rules['국수영최대']['과목'], warn:false,
  txt:`국·수·영 편중 금지: <b>${ksy.length}/${rules['국수영최대']['과목']}과목</b> ${ksy.length<=6?'(통과)':'(초과!)'}`});
 results.push({ok:req.length>=rules['정보제2외교양최소']['과목'],
  txt:`정보/제2외/교양 최소: <b>${req.length}/${rules['정보제2외교양최소']['과목']}과목</b> ${req.length>=4?'(통과)':'(부족)'}`});
 results.push({ok:artIn3.length>=1,
  txt:`예술 추가 이수(3학년): <b>${artIn3.length}과목</b> ${artIn3.length>=1?'(통과)':'(3학년에 1과목 필요)'}`});
 results.push({ok:dup.length===0,warn:dup.length>0,
  txt:dup.length? `중복 수강 확인 필요: <b>${[...new Set(dup)].join(', ')}</b>` : `중복 수강 없음 (통과)`});
 const semDone=[];
 planSemFor().forEach(sk=>{
  const sem=DB.offerings['학기'][sk]; const artSet=new Set(sem['예술택']||[]);
  const cnt=(SEL.picks[sk]||[]).filter(x=>!artSet.has(x)).length;
  const cntOk=cnt===sem['택'];
  const artReq=!!sem['예술필수'];
  const artOk=!artReq||(SEL.picks[sk]||[]).some(x=>artSet.has(x));
  semDone.push({ok:cntOk&&artOk, cntOk:cntOk, artReq:artReq, artOk:artOk, label:sem['라벨'], cnt:cnt, need:sem['택']});
 });
 return {results,semDone,all};
}

 area.innerHTML=`
 <div>

    ${chk.results.map(r=>`<div class="rule ${r.ok?'ok':(r.warn?'warn':'bad')}"><span class="st">${r.ok?'✔':(r.warn?'!':'✕')}</span><span class="tx">${r.txt}</span></div>`).join('')}

      let txt = `${esc(r.label)}: <b>${r.cnt}/${r.need}</b>`;
      if(r.artReq){ txt += r.artOk ? ' +예술 ✔' : ' <span style="color:var(--red);font-weight:800">+예술 미선택 ✕</span>'; }

    }).join('')}
   </div>
   <div style="padding:12px 17px;display:flex;flex-direction:column;gap:8px">
    <div style="display:flex;gap:8px"><button class="btn pri" style="flex:1" onclick="autoRecommendPicks()">✨ 추천 선택하기</button><button class="btn danger" style="flex:1" onclick="clearSelection()">🗑 초기화</button></div>

function clearSelection(){
 const msg = ST.grade===2 ? '3학년 계획 과목을 모두 지웁니다. (2학년 수강 과목 입력은 유지됩니다) 저장 전이라면 되돌릴 수 없습니다. 계속할까요?' : '선택(계획)한 과목을 모두 지웁니다. 저장 전이라면 되돌릴 수 없습니다. 계속할까요?';
 if(!confirm(msg))return;
 SEL.picks={};
 renderSelBody();
 toast('선택을 모두 초기화했습니다','ok');
}
function autoRecommendPicks(){
 if(ST.grade===2 && !isDone2Complete()){ toast('먼저 2학년 수강 과목을 모두 입력하세요','err'); return; }
 if(!SEL.hope.key){ toast('먼저 희망 진로(계열/학과)를 설정하고 [추천 적용]을 누른 뒤 사용하세요','err'); return; }
 const rec=recommendedSubjects();
 const off=DB.offerings['학기'];
 const rules=DB.offerings['졸업규칙']||{};
 const maxKSY=(rules['국수영최대']||{})['과목']||6;
 const minReq=(rules['정보제2외교양최소']||{})['과목']||4;
 let ksyCount=0, reqCount=0; const used=new Set(fixed2All());
 fixed2All().forEach(s=>{ if(isKSY(s))ksyCount++; if(isReqGroup(s))reqCount++; });
 SEL.picks={};
 planSemFor().forEach(sk=>{
  const sem=off[sk]; if(!sem)return;
  const need=sem['택'];
  const artSet=new Set(sem['예술택']||[]);
  let cands=[];
  for(const gk in sem['그룹']) cands=cands.concat(sem['그룹'][gk]);
  cands=[...new Set(cands)].filter(s=>!artSet.has(s) && !used.has(s));
  const score=s=>{
   let sc=0;
   if(rec.has(s)) sc+=100;
   if(isReqGroup(s) && reqCount<minReq) sc+=60;
   if(isKSY(s)){ sc += (ksyCount>=maxKSY? -500 : -5); }
   return sc;
  };
  cands.sort((a,b)=>score(b)-score(a));
  const picked=[];
  for(const s of cands){
   if(picked.length>=need) break;
   if(isKSY(s) && ksyCount>=maxKSY) continue;
   picked.push(s); used.add(s);
   if(isKSY(s)) ksyCount++;
   if(isReqGroup(s)) reqCount++;
  }
  if(sem['예술필수'] && (sem['예술택']||[]).length){
   const artPick=(sem['예술택'].find(a=>rec.has(a))) || sem['예술택'][0];
   picked.push(artPick);
  }
  SEL.picks[sk]=picked;
 });
 renderSelBody();
 toast('추천 기준으로 과목을 자동 선택했습니다. 하나씩 확인·조정해보세요','ok');
}

function subjLinks(name){return extLinkList([
 {name:'서울 진로진학정보센터',url:'https://jinhak.sen.go.kr'},
 {name:'대입정보포털 어디가',url:'https://www.adiga.kr/'},
 {name:'진학정보실',url:'https://jinhak.esteacher.kr/'},
 {name:'유튜브 · 과목 소개 검색',url:ytURL(name+' 고등학교 과목 소개')},
 {name:'에듀넷 디지털교과서·교과서',url:'https://www.edunet.net/'},
 {name:'EBSi 수능 기출',url:'https://www.ebsi.co.kr/'}
]);}
function subjDetailHTML(name){
 const det=(DB.subj_detail||{})[name]; if(!det)return '';
 let h='';
 if(det['배울']&&det['배울'].length){
  h+='<div class="field"><h4>무엇을 배울 수 있나요?</h4>'+det['배울'].map(r=>`<div class="learnrow">
   ${r.area?`<div class="learn-area">${esc(r.area)}</div>`:''}
   ${r.q?`<div class="learn-q">${esc(r.q)}</div>`:''}
   ${(r.tags&&r.tags.length)?`<div class="gwrow" style="margin:4px 0">${r.tags.map(t=>`<span class="chip">${esc(t)}</span>`).join('')}</div>`:''}
   ${(r.acts&&r.acts.length)?`<ul class="learn-acts">${r.acts.map(a=>`<li>${esc(a)}</li>`).join('')}</ul>`:''}
  </div>`).join('')+'</div>';
 }
 if(det['심화']&&det['심화'].length){
  h+='<div class="field"><h4>선배가 들려주는 심화 학습 활동 (예시)</h4>'+det['심화'].map(r=>`<div class="learnrow">
   <div class="learn-area">${esc(r.field||'심화 탐구')}${r.task?` · <span style="font-weight:600;color:var(--t2)">${esc(r.task)}</span>`:''}</div>
   <ul class="learn-acts">${r.acts.map(a=>`<li>${esc(a)}</li>`).join('')}</ul>
  </div>`).join('')+'</div>';
 }
 if(det['출처']){
  h+='<div class="field" style="margin-top:10px;padding-top:8px;border-top:1px dashed var(--line,#ddd)"><h4 style="font-size:12px;color:var(--t2)">출처</h4><p style="font-size:11px;color:var(--t2);line-height:1.5">'+esc(det['출처'])+'</p></div>';
 }
 if(det['추천']&&det['추천'].length){
  h+='<div class="field"><h4>이런 학생에게 추천해요</h4><ul class="learn-acts reco">'+det['추천'].map(a=>`<li>${esc(a)}</li>`).join('')+'</ul></div>';
 }
 return h;
}
function showSubj(name){
 const g=DB.gwamok[name]; const gun=subjGun(name), typ=subjType(name);
 const cur=DB.curriculum.find(c=>c['과목']===name||c['과목'].replace(/\s/g,'')===name.replace(/\s/g,''));
 const sem = cur?['1-1','1-2','2-1','2-2','3-1','3-2'].filter(k=>cur[k]).map(k=>({'1-1':'1학년1학기','1-2':'1학년2학기','2-1':'2학년1학기','2-2':'2학년2학기','3-1':'3학년1학기','3-2':'3학년2학기'}[k])):[];
 const sn=name.replace(/\s/g,'');
 const isSu=['공통국어1','공통국어2','대수','미적분Ⅰ','확률과 통계','공통영어1','공통영어2','문학','독서와 작문','화법과 언어','미적분Ⅱ','기하','물리학','화학','생명과학','지구과학','확률과통계'].some(x=>x.replace(/\s/g,'')===sn);
 let body=`<div class="kv" style="margin-bottom:14px">
   <dt>교과(군)</dt><dd><span class="chip ${gun}">${gun}</span></dd>
   <dt>선택 유형</dt><dd><span class="tag ${typ}">${typ||'-'}</span></dd>
   <dt>편성 학점</dt><dd>${cur?cur['운영학점']+'학점':'3~5학점'}</dd>
   <dt>개설 시기</dt><dd>${sem.join(', ')||'-'} (구암고 편제 기준)</dd>
   <dt>평가</dt><dd>${subjEval(name)}</dd>
   <dt>2029 수능</dt><dd>${isSu?'출제 범위 관련 과목':'수능 미출제(내신 중심)'}</dd>
 </div>`;
 if(g){ body+=`<div class="field"><h4>과목을 여는 한 줄</h4><p style="font-size:13px;color:var(--t2)">${esc(g['한줄소개'])}</p></div>`;
  if(g['키워드'])body+=`<div class="gwrow" style="margin-top:8px">${g['키워드'].split(/\s+/).filter(Boolean).map(k=>`<span class="chip">${esc(k)}</span>`).join('')}</div>`;
 }
 body+=subjDetailHTML(name);
 if(!g && !(DB.subj_detail||{})[name]) body+=`<p class="muted">이 과목의 상세 프로필은 준비 중입니다. 아래 참고 링크와 안내서를 확인하세요.</p>`;
 body+=`<div class="field" style="margin-top:14px"><h4>참고 링크</h4>${subjLinks(name)}</div>`;
 openModal(esc(name)+' <span style="font-size:12px;color:var(--sage-d)">'+gun+' · '+(typ||'')+'</span>', body, `<button class="btn" onclick="printSubj('${esc(name).replace(/'/g,"\\'")}')">🖨 인쇄</button><button class="btn ink" onclick="closeModal()">닫기</button>`);
}
function printSubj(name){
 const g=DB.gwamok[name]; const det=(DB.subj_detail||{})[name]; const gun=subjGun(name),typ=subjType(name);
 const cur=DB.curriculum.find(c=>c['과목']===name||c['과목'].replace(/\s/g,'')===name.replace(/\s/g,''));
 let h=`<h1>${esc(name)} <span style="font-size:14px;color:#888">(${gun} · ${typ||''})</span></h1>`;
 h+=`<p><b>편성 학점:</b> ${cur?cur['운영학점']+'학점':'3~5학점'}</p>`;
 if(g){h+=`<p>${esc(g['한줄소개'])}</p>`; if(g['키워드'])h+=`<p style="color:#0a6e59">${esc(g['키워드'])}</p>`;}
 if(det){
  if(det['배울']&&det['배울'].length){h+='<h2>무엇을 배울 수 있나요?</h2>'+det['배울'].map(r=>`<p><b>${esc(r.area||'')}</b> ${esc(r.q||'')} ${(r.tags||[]).map(esc).join(' ')}</p>`+((r.acts&&r.acts.length)?'<ul>'+r.acts.map(a=>`<li>${esc(a)}</li>`).join('')+'</ul>':'')).join('');}
  if(det['심화']&&det['심화'].length){h+='<h2>선배가 들려주는 심화 학습 활동</h2>'+det['심화'].map(r=>`<p><b>${esc(r.field||'')}</b> ${esc(r.task||'')}</p><ul>${r.acts.map(a=>`<li>${esc(a)}</li>`).join('')}</ul>`).join('');}
  if(det['출처']){h+='<h2>출처</h2><p style="font-size:12px;color:#666">'+esc(det['출처'])+'</p>';}
  if(det['추천']&&det['추천'].length){h+='<h2>이런 학생에게 추천해요</h2><ul>'+det['추천'].map(a=>`<li>${esc(a)}</li>`).join('')+'</ul>';}
 }
 printArea(name+' 과목 정보',h);
}

let subjFilter={gun:'',q:''};
PAGES.subject=function(p){
 const guns=['국어','수학','영어','사회','과학','체육','예술','기가정','외한','교양'];
 p.innerHTML=`<div class="phead"><div class="eyebrow">COURSE CATALOG</div><h1>교과정보</h1>
 <p>2022 개정 교육과정 선택 과목의 <b>프로필·평가·수능 출제·핵심 키워드</b>를 확인합니다. 과목 카드를 눌러 상세 정보를 보세요.</p></div>
 <div class="searchbar"><input type="text" id="subjQ" placeholder="과목명 검색 (예: 미적분, 물리학, 경제)" value="${esc(subjFilter.q)}"></div>
 <div class="pillrow" style="margin-bottom:14px"><button class="pill ${subjFilter.gun===''?'on':''}" onclick="setSubjGun('')">전체</button>
 ${guns.map(g=>`<button class="pill ${subjFilter.gun===g?'on':''}" onclick="setSubjGun('${g}')">${g}</button>`).join('')}</div>
 <div id="subjList"></div>`;
 $('#subjQ').addEventListener('input',e=>{subjFilter.q=e.target.value;renderSubjList();});
 renderSubjList();
};
function setSubjGun(g){subjFilter.gun=g;PAGES.subject($('#main .page'));}
function renderSubjList(){
 const wrap=$('#subjList'); const q=subjFilter.q.replace(/\s/g,'');
 let list=Object.keys(DB.subject_master).filter(n=>{
  if(subjFilter.gun&&subjGun(n)!==subjFilter.gun)return false;
  if(q&&!n.replace(/\s/g,'').includes(q))return false;
  return true;
 });
 const ord={'공통':0,'일반':1,'진로':2,'융합':3};
 list.sort((a,b)=>(ord[subjType(a)]??9)-(ord[subjType(b)]??9)||a.localeCompare(b));
 if(!list.length){wrap.innerHTML='<div class="card pad"><div class="empty">검색 결과가 없습니다.</div></div>';return;}
 wrap.innerHTML=`<div class="stack">${list.map(n=>{const g=DB.gwamok[n];const gun=subjGun(n),typ=subjType(n);return `<div class="card pad deptcard" onclick="showSubj('${esc(n).replace(/'/g,"\\'")}')">
  <div style="display:flex;gap:6px;align-items:center;margin-bottom:6px"><span class="chip ${gun}">${gun}</span><span class="tag ${typ}">${typ}</span></div>
  <h3 style="font-size:14.5px">${esc(n)}</h3>
  <p style="font-size:12px;color:var(--t2)">${g?esc(g['한줄소개'].slice(0,70)):'상세 보기'}</p></div>`;}).join('')}</div>
 <div class="card pad" style="margin-top:14px"><div class="field" style="margin-bottom:0"><h4>교과 학습 참고 링크</h4></div><div class="linklist" style="margin-top:10px">${DB.content['링크']['교과'].map(l=>`<a href="${l.url}" target="_blank">${esc(l.name)}</a>`).join('')}</div></div>`;
}

 if(g['진출분야']&&g['진출분야'].length){ h+='<div class="field"><h4>진출 분야 · 직업</h4><div class="gwrow">'+g['진출분야'].map(function(x){return '<span class="chip" style="background:#eef1f5;color:#2a5fa0">'+esc(x)+'</span>';}).join('')+'</div></div>'; }

function deptBullets(text){
 if(!text) return '';
 var t=String(text).replace(/\s*유사\s*학과\s*$/,'').replace(/[\s]*[을를〉「」]+\s*$/,'').trim();
 var items=t.split(/\s*[*＊]\s*|\s+·\s+/).map(function(s){return s.replace(/^[-·:'"]+/,'').replace(/[을를〉「」]\s*$/,'').trim();}).filter(function(s){return s.length>1;});
 if(items.length<=1) return '<p style="font-size:13px;color:var(--t2);line-height:1.7">'+esc(text)+'</p>';
 return '<ul class="learn-acts">'+items.map(function(s){return '<li>'+esc(s)+'</li>';}).join('')+'</ul>';

function deptCourses(text){
 if(!text) return '';

}
